---
apiVersion: v1
kind: Service
metadata:
  name: result-service
  namespace: university-backend
  labels:
    app: result-service
    component: backend

spec:
  type: ClusterIP
  ports:
  - port: 5002
    targetPort: 5002
    name: http
  selector:
    app: result-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-service
  namespace: university-backend
  labels:
    app: result-service
    version: v1

spec:
  replicas: 1
  selector:
    matchLabels:
      app: result-service
  template:
    metadata:
      labels:
        app: result-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5002"
    spec:
      containers:
      - name: result-service
        image: result-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5002
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 5
          periodSeconds: 5
