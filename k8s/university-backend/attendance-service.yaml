---
apiVersion: v1
kind: Service
metadata:
  name: attendance-service
  namespace: university-backend
  labels:
    app: attendance-service
    component: backend

spec:
  type: ClusterIP
  ports:
  - port: 5001
    targetPort: 5001
    name: http
  selector:
    app: attendance-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: attendance-service
  namespace: university-backend
  labels:
    app: attendance-service
    version: v1

spec:
  replicas: 1
  selector:
    matchLabels:
      app: attendance-service
  template:
    metadata:
      labels:
        app: attendance-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5001"
    spec:
      containers:
      - name: attendance-service
        image: attendance-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5001
          name: http
        env:
        - name: PVC_PATH
          value: /data/attendance
        volumeMounts:
        - name: attendance-storage
          mountPath: /data/attendance
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: attendance-storage
        persistentVolumeClaim:
          claimName: attendance-storage
